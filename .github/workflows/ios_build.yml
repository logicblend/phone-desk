name: iOS Build (Unsigned IPA)

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab
  push:
    branches: [ "main", "master" ]
    paths:
      - 'mobile_client/**'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        working-directory: mobile_client
        run: flutter pub get

      - name: Build unsigned iOS App
        working-directory: mobile_client
        run: flutter build ios --release --no-codesign

      - name: Create IPA payload
        working-directory: mobile_client
        run: |
          mkdir -p build/ios/iphoneos/IPA_Root/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/IPA_Root/Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhoneDeskClient-iOS-IPA
          path: mobile_client/build/ios/iphoneos/IPA_Root
